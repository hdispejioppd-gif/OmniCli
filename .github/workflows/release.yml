name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: omni-linux-amd64
          - os: windows-latest
            artifact: omni-windows-amd64
          - os: macos-latest
            artifact: omni-macos-amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: release-${{ matrix.os }}-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release
      - name: Strip binary (unix)
        if: runner.os != 'Windows'
        run: strip target/release/omni
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/release/omni
            target/release/omni.exe
          if-no-files-found: ignore

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/omni-linux-amd64/*
            artifacts/omni-windows-amd64/*
            artifacts/omni-macos-amd64/*
